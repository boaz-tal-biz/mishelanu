services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-mishelanu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mishelanu}
      POSTGRES_DB: ${DB_NAME:-mishelanu}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mishelanu}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  pgdata:
